name: 智能投顾数据更新

on:
  schedule:
    # 北京时间工作日 11:00 = UTC 03:00
    - cron: '0 3 * * 1-5'
    # 北京时间工作日 14:10 = UTC 06:10
    - cron: '10 6 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（如有）
        run: pip install requests --quiet || true

      - name: 采集实时数据
        run: python cloud_fetcher.py
        timeout-minutes: 5

      - name: 运行数据匹配管道
        run: python data_pipeline.py --input data/market_input.json --output data/daily.json
        timeout-minutes: 3

      - name: 采集基金历史业绩
        run: python fund_history_fetcher.py
        timeout-minutes: 10

      - name: 存档历史数据
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p data/history
          cp data/daily.json "data/history/${DATE}.json"
          echo "📁 历史存档: data/history/${DATE}.json"

      - name: 提交更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "理财经理数据机器人"
          git config user.email "bot@wealth-advisor.local"
          git add data/market_input.json data/daily.json data/history/ data/fund_history.json data/fund_nav_history.json
          git diff --cached --quiet || git commit -m "📊 数据自动更新 $(date +'%Y-%m-%d %H:%M')"
          git push
